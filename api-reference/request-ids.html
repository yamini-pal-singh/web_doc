        <h1>Request <span class="accent-italic">IDs</span></h1>
        <p class="lead">Every response includes <code>request_id</code> (and an <code>X-Request-Id</code> header). Log it, Shunya support uses it to trace issues. On WebSocket, the <code>session_id</code> in the <code>ready</code> event is the equivalent.</p>
